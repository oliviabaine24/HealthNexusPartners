<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Health Nexus Partners</title>
<meta name="description" content="Health Nexus Partners — convening capital, care, and policy across women's health events.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,300..700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#132a2d;
    --teal-deep:#12363d;
    --teal:#204c53;
    --cream:#f7f1e5;
    --terracotta:#c67a3e;
    --terracotta-deep:#a8622e;
    --terracotta-pale:#f0d4b8;
    --ff-display:'Fraunces', Georgia, serif;
    --ff-body:'Inter', -apple-system, sans-serif;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:var(--ff-body);
    color:var(--cream);
    min-height:100vh;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    text-align:center;
    padding:32px;
    background:
      radial-gradient(1100px 700px at 82% -10%, rgba(198,122,62,0.22), transparent 60%),
      linear-gradient(150deg, var(--teal-deep) 0%, var(--teal) 55%, #2e6169 100%);
  }
  .mark{width:52px; height:52px; margin-bottom:26px; opacity:.9;}
  .eyebrow{
    font-size:12px; font-weight:600; letter-spacing:.18em; text-transform:uppercase;
    color:var(--terracotta-pale); margin-bottom:18px;
  }
  h1{
    font-family:var(--ff-display); font-weight:600; font-size:clamp(34px,6vw,58px);
    letter-spacing:-0.01em; margin-bottom:18px;
  }
  p.sub{
    font-family:var(--ff-display); font-style:italic; font-size:clamp(16px,2vw,20px);
    color:rgba(247,241,229,.8); max-width:38ch; margin-bottom:44px;
  }
  .card{
    background:rgba(247,241,229,0.08);
    border:1px solid rgba(253,250,243,.22);
    border-radius:2px; padding:30px 34px; max-width:420px;
  }
  .card .tag{
    display:inline-block; background:var(--terracotta); color:#fff;
    font-size:10.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase;
    padding:5px 10px; border-radius:2px; margin-bottom:16px;
  }
  .card h2{font-family:var(--ff-display); font-size:22px; margin-bottom:10px; color:#fdfaf3;}
  .card p{font-size:14.5px; color:rgba(247,241,229,.75); margin-bottom:22px;}
  .btn{
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    font-weight:600; font-size:13px; letter-spacing:.04em; text-transform:uppercase;
    padding:13px 26px; border-radius:2px; background:var(--terracotta); color:#fff;
    text-decoration:none; transition:background .2s ease;
  }
  .btn:hover{background:var(--terracotta-deep);}
  footer{margin-top:60px; font-size:12px; color:rgba(247,241,229,.5); letter-spacing:.03em;}
</style>
</head>
<body>
  <svg class="mark" viewBox="0 0 60 60" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M30 6 L36 24 L54 30 L36 36 L30 54 L24 36 L6 30 L24 24 Z" stroke="currentColor" stroke-width="2.4" stroke-linejoin="round" fill="none" style="color:#fdfaf3;"/>
  </svg>
  <span class="eyebrow">Health Nexus Partners</span>
  <h1>Convening capital,<br>care &amp; policy.</h1>
  <p class="sub">Our full site is on its way. In the meantime, here's what's happening now.</p>

  <div class="card">
    <span class="tag">Live Event</span>
    <h2>Women's Health Nexus 2026</h2>
    <p>November 5, 2026 · Congressional Country Club · Bethesda, Maryland</p>
    <a href="/whn/" class="btn">View Event Page →</a>
  </div>

  <footer>&copy; 2026 Health Nexus Partners</footer>
</body>
</html>
